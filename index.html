            from { transform: translateY(100%); }
            to { transform: translateY(0); }

            height: 320px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

            color: #FFFFFF !important;
            border-left: 6px solid var(--osaka-gold) !important;
        }

        .map-interactive-container {
            width: 100%;
            height: 400px;
            background: #eee;
            border-radius: 2rem;
            position: relative;
            overflow: hidden;
            border: 2px solid #fff;
            touch-action: none;
            cursor: grab;

            width: 100%;

            transform-origin: center center;

            image-rendering: high-quality;

        const checkListData = ["護照全員", "VIP 憑證", "網卡/Wifi", "日圓現金", "保暖外套", "藥品包"];

        function initEnhancedMapViewer() {
            const viewport = document.querySelector('.map-interactive-container');
            const mapImg = document.getElementById('zoomable-map');
            if(!mapImg || !viewport) return;
            mapScale = 1; mapTranslate = { x: 0, y: 0 };
            const updateUI = () => mapImg.style.transform = `translate(${mapTranslate.x}px, ${mapTranslate.y}px) scale(${mapScale})`;
            viewport.addEventListener('wheel', (e) => {
                e.preventDefault();
                mapScale = Math.min(Math.max(1, mapScale + (e.deltaY > 0 ? -0.25 : 0.25)), 5);
                updateUI();
            }, { passive: false });
            let isDragging = false, startPos = { x: 0, y: 0 };
            viewport.addEventListener('mousedown', (e) => {
                isDragging = true;
                startPos = { x: e.clientX - mapTranslate.x, y: e.clientY - mapTranslate.y };
                viewport.style.cursor = 'grabbing';
            });
            window.addEventListener('mousemove', (e) => {
                if(!isDragging) return;
                mapTranslate.x = e.clientX - startPos.x;
                mapTranslate.y = e.clientY - startPos.y;
                updateUI();
            });
            window.addEventListener('mouseup', () => { isDragging = false; viewport.style.cursor = 'grab'; });
            viewport.addEventListener('dblclick', () => { mapScale = mapScale > 1.5 ? 1 : 3; mapTranslate = {x:0, y:0}; updateUI(); });
        }
